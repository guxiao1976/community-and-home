# Per-artifact rules
rules:
  proposal:
    - 提案应明确说明变更的业务价值和技术影响
    - 如果涉及多个服务，需要说明服务间的交互方式
    - 如果涉及数据库变更，需要包含迁移策略
    - 如果涉及 API 变更，需要考虑向后兼容性
    - 包含"非目标"部分，明确不在本次变更范围内的内容
    - 提案长度控制在 500 字以内（中文）或 800 词以内（英文）

  tasks:
    - 任务拆分应遵循单一职责原则
    - 每个任务预估时间不超过 2 小时
    - 后端任务应包含：API 定义 → Logic 实现 → Model 操作 → 测试
    - 前端任务应包含：API 接口 → 组件开发 → 状态管理 → 路由配置
    - 跨服务任务需要明确服务调用顺序
    - 数据库变更任务需要包含回滚方案

  implementation:
    - 后端代码必须使用 responsex.Response 返回响应
    - goctl 生成的代码不要手动修改 types.go，应修改 .api 文件后重新生成
    - 前端组件必须使用 Composition API
    - 所有 API 调用必须通过 src/api/ 目录的封装函数
    - 新增数据库表必须遵循命名规范（id_*, md_*）
    - 提交前必须通过类型检查和代码格式化
    - 重要功能变更需要添加单元测试

    # Go-Zero 微服务开发规范
    - 创建数据库记录时，时间字段必须使用 time.Now()，不能使用零值 time.Time{}
    - MySQL JSON 类型字段必须使用 json.Marshal() 转换，不能直接存储字符串
    - 更新/删除操作后必须调用缓存失效方法（如 InvalidateCache）
    - RPC 服务实现完成后，必须同步实现 API 层的 Logic 调用
    - 修改代码后必须重新编译并重启服务才能生效

    # API 联调测试规范
    - 新增 CRUD API 必须完整测试：创建 → 查询 → 更新 → 删除 → 验证删除
    - 测试前确认服务二进制文件是最新编译版本（检查文件时间戳）
    - 发现空实现（todo 注释）必须先实现再测试，不要假设功能已完成
