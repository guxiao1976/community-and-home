version: '3.8'

# 本地开发网络，所有服务互通，宿主机可访问
networks:
  gozero-dev:
    driver: bridge

services:
  # ===================== MySQL 8.0 核心数据库 =====================
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    networks:
      - gozero-dev
    ports:
      - "3306:3306"  # 宿主机访问端口
    environment:
      MYSQL_ROOT_PASSWORD: 123456  # root密码
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    command: --lower-case-table-names=1 --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - ./mysql/data:/var/lib/mysql  # 数据持久化
      - ./mysql/conf:/etc/mysql/conf.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===================== Redis 7.0 分布式缓存 =====================
  redis:
    image: redis:7.0
    container_name: redis
    restart: always
    networks:
      - gozero-dev
    ports:
      - "6379:6379"  # 宿主机访问端口
    command: redis-server --requirepass 123456 --appendonly yes  # 开启密码+持久化
    volumes:
      - ./redis/data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "123456", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===================== Etcd 3.5 服务注册发现 =====================
  etcd:
    image: quay.io/coreos/etcd:v3.5.0
    container_name: etcd
    restart: always
    networks:
      - gozero-dev
    ports:
      - "2379:2379"  # 客户端访问端口(go-zero必备)
      - "2380:2380"  # 集群通信端口
    command: >
      etcd
      --advertise-client-urls http://0.0.0.0:2379
      --listen-client-urls http://0.0.0.0:2379
      --initial-advertise-peer-urls http://0.0.0.0:2380
      --listen-peer-urls http://0.0.0.0:2380
      --initial-cluster-token etcd-cluster-1
      --initial-cluster default=http://0.0.0.0:2380
      --initial-cluster-state new
    volumes:
      - ./etcd/data:/etcd-data

  # ===================== MinIO 对象存储(带Web管理面板) =====================
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: always
    networks:
      - gozero-dev
    ports:
      - "9000:9000"   # API访问端口(程序调用)
      - "9001:9001"   # Web管理面板端口(浏览器访问)
    environment:
      MINIO_ROOT_USER: admin       # 管理面板账号
      MINIO_ROOT_PASSWORD: 12345678 # 管理面板密码
    command: server /data --console-address ":9001"
    volumes:
      - ./minio/data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
