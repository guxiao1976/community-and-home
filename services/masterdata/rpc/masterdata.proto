syntax = "proto3";

package masterdata;
option go_package = "./pb";

message Division {
  int64 id = 1;
  int64 parent_id = 2;
  int32 level = 3;
  string name = 4;
  string code = 5;
  string path = 6;
  int32 sort_order = 7;
  int32 status = 8;
  int64 created_by = 9;
  string created_time = 10;
  string updated_time = 11;
}

message DivisionTree {
  Division division = 1;
  repeated DivisionTree children = 2;
}

message ResidentialArea {
  int64 id = 1;
  int64 county_id = 2;
  int64 street_id = 3;
  int64 community_div_id = 4;
  string code = 5;
  string name = 6;
  string address = 7;
  double area = 8;
  int32 population = 9;
  int32 community_type = 10;
  int32 submission_status = 11;
  int64 submitter_id = 12;
  string submit_time = 13;
  int64 reviewer_id = 14;
  string review_time = 15;
  string review_notes = 16;
  string created_time = 17;
  string updated_time = 18;
}

// Division RPC requests/responses
message GetDivisionReq {
  int64 id = 1;
}

message GetDivisionResp {
  Division division = 1;
}

message GetDivisionsByIdsReq {
  repeated int64 ids = 1;
}

message GetDivisionsByIdsResp {
  repeated Division divisions = 1;
}

message GetDivisionTreeReq {
  int64 parent_id = 1;
}

message GetDivisionTreeResp {
  repeated DivisionTree tree = 1;
}

message GetDivisionPathReq {
  int64 id = 1;
}

message GetDivisionPathResp {
  repeated Division path = 1;
}

message ValidateScopeReq {
  int64 user_id = 1;
  int64 division_id = 2;
}

message ValidateScopeResp {
  bool allowed = 1;
}

message CreateDivisionReq {
  int64 parent_id = 1;
  int32 level = 2;
  string name = 3;
  string code = 4;
  int32 sort_order = 5;
  int64 created_by = 6;
}

message CreateDivisionResp {
  int64 id = 1;
}

message UpdateDivisionReq {
  int64 id = 1;
  int64 parent_id = 2;
  int32 level = 3;
  string name = 4;
  string code = 5;
  int32 sort_order = 6;
  int32 status = 7;
}

message UpdateDivisionResp {
  bool success = 1;
}

message DeleteDivisionReq {
  int64 id = 1;
}

message DeleteDivisionResp {
  bool success = 1;
}

// Residential Area RPC requests/responses
message GetResidentialAreaReq {
  int64 id = 1;
}

message GetResidentialAreaResp {
  ResidentialArea residential_area = 1;
}

message GetResidentialAreasByIdsReq {
  repeated int64 ids = 1;
}

message GetResidentialAreasByIdsResp {
  repeated ResidentialArea residential_areas = 1;
}

message GetResidentialAreasByDivisionReq {
  int64 county_id = 1;
  int64 street_id = 2;
  int64 community_div_id = 3;
  int32 status = 4; // 0=all, 1=approved only
}

message GetResidentialAreasByDivisionResp {
  repeated ResidentialArea residential_areas = 1;
}

// Masterdata service definition
service Masterdata {
  // Division RPC methods
  rpc GetDivision(GetDivisionReq) returns (GetDivisionResp);
  rpc GetDivisionsByIds(GetDivisionsByIdsReq) returns (GetDivisionsByIdsResp);
  rpc GetDivisionTree(GetDivisionTreeReq) returns (GetDivisionTreeResp);
  rpc GetDivisionPath(GetDivisionPathReq) returns (GetDivisionPathResp);
  rpc ValidateScope(ValidateScopeReq) returns (ValidateScopeResp);
  rpc CreateDivision(CreateDivisionReq) returns (CreateDivisionResp);
  rpc UpdateDivision(UpdateDivisionReq) returns (UpdateDivisionResp);
  rpc DeleteDivision(DeleteDivisionReq) returns (DeleteDivisionResp);

  // Residential Area RPC methods
  rpc GetResidentialArea(GetResidentialAreaReq) returns (GetResidentialAreaResp);
  rpc GetResidentialAreasByIds(GetResidentialAreasByIdsReq) returns (GetResidentialAreasByIdsResp);
  rpc GetResidentialAreasByDivision(GetResidentialAreasByDivisionReq) returns (GetResidentialAreasByDivisionResp);
}
