Name: identity.rpc
ListenOn: 0.0.0.0:8081
Timeout: 30000

Etcd:
  Hosts:
    - 127.0.0.1:2379
  Key: identity.rpc

DataSource: root:123456@tcp(localhost:3306)/identity_db?charset=utf8mb4&parseTime=true&loc=Local
Cache:
  - Host: localhost:6379

Auth:
  AccessSecret: your-secret-key-change-in-production
  AccessExpire: 86400
