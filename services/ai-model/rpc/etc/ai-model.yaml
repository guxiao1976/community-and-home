Name: ai-model.rpc
ListenOn: 0.0.0.0:8080

# etcd 服务注册
Etcd:
  Hosts:
    - localhost:2379
  Key: ai-model.rpc

# MySQL 配置
DataSource: root:123456@tcp(localhost:3306)/ai_model_db?charset=utf8mb4&parseTime=true&loc=Local

# API Key 加密密钥（32字节）
EncryptionKey: "12345678901234567890123456789012"

# Redis 配置
CacheRedis:
  - Host: localhost:6379
    Type: node
    Pass: "123456"

# 日志配置
Log:
  ServiceName: ai-model-rpc
  Mode: console
  Level: info

# 超时配置
Timeout: 60000  # 默认超时 60 秒
