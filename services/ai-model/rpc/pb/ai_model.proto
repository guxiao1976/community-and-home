syntax = "proto3";

package ai_model;
option go_package = "./pb";

// AI 模型统一管理服务
service AiModel {
  // 通用模型调用（单次）
  rpc CallModel(ModelCallRequest) returns (ModelCallResponse);

  // 通用模型调用（批量）
  rpc CallModelBatch(ModelBatchRequest) returns (ModelBatchResponse);

  // 获取可用模型列表
  rpc GetAvailableModels(GetModelsRequest) returns (GetModelsResponse);

  // 健康检查
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);

  // 单个模型健康检查
  rpc CheckModelHealth(ModelHealthCheckReq) returns (ModelHealthCheckResp);

  // 模型配置管理
  rpc CreateModelConfig(CreateModelConfigReq) returns (ModelConfigResp);
  rpc UpdateModelConfig(UpdateModelConfigReq) returns (ModelConfigResp);
  rpc DeleteModelConfig(DeleteModelConfigReq) returns (DeleteModelConfigResp);
  rpc GetModelConfig(GetModelConfigReq) returns (ModelConfigResp);
}

// ============ 通用模型调用 ============
message ModelCallRequest {
  string model_name = 1;                 // 模型名称：claude-opus-4/gpt-4
  string prompt = 2;                     // 提示词
  map<string, string> parameters = 3;    // 参数：temperature/max_tokens等
  string template_id = 4;                // 模板ID（可选）
  map<string, string> variables = 5;     // 模板变量（可选）
  string caller_service = 6;             // 调用方服务名
}

message ModelCallResponse {
  string content = 1;                    // 响应内容
  int32 input_tokens = 2;                // 输入token数
  int32 output_tokens = 3;               // 输出token数
  double cost = 4;                       // 成本(USD)
  int64 latency_ms = 5;                  // 耗时(ms)
  string model_used = 6;                 // 实际使用的模型
  string request_id = 7;                 // 请求ID
}

// ============ 批量调用 ============
message ModelBatchRequest {
  string model_name = 1;                 // 模型名称
  repeated string prompts = 2;           // 提示词列表
  map<string, string> parameters = 3;    // 参数
  string caller_service = 4;             // 调用方服务名
}

message ModelBatchResponse {
  repeated ModelCallResponse results = 1; // 结果列表
  int32 total = 2;                       // 总数
  int32 success = 3;                     // 成功数
  int32 failed = 4;                      // 失败数
  double total_cost = 5;                 // 总成本
}

// ============ 获取模型列表 ============
message GetModelsRequest {
  string provider = 1;                   // 提供商过滤（可选）
  bool only_healthy = 2;                 // 仅返回健康的模型
}

message GetModelsResponse {
  repeated ModelInfo models = 1;
}

message ModelInfo {
  int64 id = 1;
  string name = 2;
  string type = 3;                       // cloud/local
  string provider = 4;                   // claude/openai/ollama
  string display_name = 5;
  repeated string capabilities = 6;
  double cost_per_1k_input_tokens = 7;
  double cost_per_1k_output_tokens = 8;
  string health_status = 9;              // healthy/degraded/unhealthy
  int32 priority = 10;
  bool enabled = 11;
}

// ============ 健康检查 ============
message HealthCheckRequest {}

message HealthCheckResponse {
  string status = 1;                     // healthy/unhealthy
  map<string, ModelHealthStatus> models = 2;
  int64 uptime_seconds = 3;
  string version = 4;
}

message ModelHealthStatus {
  string name = 1;
  string status = 2;
  int64 avg_latency_ms = 3;
  int64 total_requests = 4;
  double success_rate = 5;
}

// 单个模型健康检查
message ModelHealthCheckReq {
  int64 model_id = 1;
  string api_key = 2;
}

message ModelHealthCheckResp {
  string status = 1;        // healthy/unhealthy
  int64 response_time = 2;  // 响应时间（毫秒）
  string message = 3;       // 错误信息或详细说明
}

// ============ 模型配置管理 ============
message CreateModelConfigReq {
  string name = 1;
  string display_name = 2;
  string provider = 3;
  string type = 4;
  string endpoint = 5;
  int32 max_tokens = 6;
  string supported_features = 7;
  double cost_per_1k_input_tokens = 8;
  double cost_per_1k_output_tokens = 9;
  string description = 10;
}

message UpdateModelConfigReq {
  int64 id = 1;
  string display_name = 2;
  string endpoint = 3;
  int32 max_tokens = 4;
  string supported_features = 5;
  double cost_per_1k_input_tokens = 6;
  double cost_per_1k_output_tokens = 7;
  int64 status = 8;
  string description = 9;
}

message DeleteModelConfigReq {
  int64 id = 1;
}

message GetModelConfigReq {
  int64 id = 1;
}

message ModelConfigResp {
  int64 id = 1;
  string name = 2;
  string display_name = 3;
  string provider = 4;
  string type = 5;
  string endpoint = 6;
  int32 max_tokens = 7;
  string supported_features = 8;
  double cost_per_1k_input_tokens = 9;
  double cost_per_1k_output_tokens = 10;
  int64 status = 11;
  string description = 12;
}

message DeleteModelConfigResp {
  bool success = 1;
}
